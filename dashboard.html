<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoSCoW 實時動態統計後台 (Supabase 版)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: system-ui, sans-serif; background-color: #f4f6f9; padding: 30px; margin: 0; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #2b579a; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 15px; }
        th, td { border: 1px solid #ddd; padding: 12px 15px; text-align: center; }
        th { background-color: #2b579a; color: white; font-weight: 600; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .badge { padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 13px; display: inline-block; }
        .badge-approve { background-color: #e8f5e9; color: #2e7d32; border: 1px solid #4caf50; }
        .badge-reject { background-color: #ffebee; color: #c62828; border: 1px solid #f44336; }
        .badge-neutral { background-color: #fff3e0; color: #ef6c00; border: 1px solid #ff9800; }
        .badge-none { background-color: #eee; color: #777; }
        .refresh-tag { float: right; font-size: 12px; color: #2e7d32; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>MoSCoW 實時決策統計大盤 <span class="refresh-tag">● 每 5 秒自動重新整理</span></h1>
    <div class="subtitle">本頁面直接對接 Supabase 資料庫，即時顯示 150 題之最新最高票結果</div>
    
    <table>
        <thead>
            <tr>
                <th style="width: 8%;">題號</th>
                <th style="text-align: left; width: 42%;">項目名稱</th>
                <th style="width: 12%;">贊成票</th>
                <th style="width: 12%;">反對票</th>
                <th style="width: 12%;">棄權票</th>
                <th style="width: 14%;">當前最高票決議</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="6" style="text-align:center; color:#999;">正在串接資料庫數據...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const SUPABASE_URL = 'https://nlaclihhnzpjblktyxgo.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sYWNsaWhobnpwamJsa3R5eGdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNDA2NDksImV4cCI6MjA5NDgxNjY0OX0.Xx42I4OpZG_7_kQAoOjLar1iFGbNIoT5omgwVnPOEcQ';
    const _supabase = @supabase/supabase-js.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function fetchRealtimeStats() {
        try {
            // 直接撈取最新累加票數
            const { data, error } = await _supabase
                .from('Votes')
                .select('*')
                .order('id', { ascending: true });

            if (error) throw error;

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            data.forEach((row, index) => {
                const app = row.approve_count || 0;
                const rej = row.reject_count || 0;
                const neu = row.neutral_count || 0;

                let maxText = "尚無投票";
                let maxClass = "badge-none";

                if (app > 0 || rej > 0 || neu > 0) {
                    if (app >= rej && app >= neu) { maxText = "贊成"; maxClass = "badge-approve"; }
                    else if (rej >= app && rej >= neu) { maxText = "反對"; maxClass = "badge-reject"; }
                    else { maxText = "棄權"; maxClass = "badge-neutral"; }
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td style="text-align: left; font-weight: 500;">${row.question_text}</td>
                    <td style="color: #2e7d32; font-weight: bold;">${app}</td>
                    <td style="color: #c62828; font-weight: bold;">${rej}</td>
                    <td style="color: #ef6c00; font-weight: bold;">${neu}</td>
                    <td><span class="badge ${maxClass}">${maxText}</span></td>
                `;
                tbody.appendChild(tr);
            });
        } catch (err) {
            console.error("更新大盤失敗:", err);
        }
    }

    // 初始化讀取，並設定每 5 秒鐘自動重抓一次
    fetchRealtimeStats();
    setInterval(fetchRealtimeStats, 5000);
</script>
</body>
</html>
