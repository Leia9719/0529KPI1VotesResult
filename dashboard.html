<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoSCoW 投票結果即時統計後台</title>
    <style>
        body { font-family: system-ui, sans-serif; background-color: #f4f6f9; padding: 30px; margin: 0; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #2b579a; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 15px; }
        th, td { border: 1px solid #ddd; padding: 12px 15px; text-align: center; }
        th { background-color: #2b579a; color: white; font-weight: 600; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: #f1f5f9; }
        .badge { padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 13px; display: inline-block; }
        .badge-approve { background-color: #e8f5e9; color: #2e7d32; border: 1px solid #4caf50; }
        .badge-reject { background-color: #ffebee; color: #c62828; border: 1px solid #f44336; }
        .badge-neutral { background-color: #fff3e0; color: #ef6c00; border: 1px solid #ff9800; }
        .badge-none { background-color: #eee; color: #777; }
        .loading { text-align: center; font-size: 18px; color: #888; padding: 50px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>MoSCoW 投票結果即時統計後台</h1>
    <div class="subtitle">自動解析超長 JSON 數據，即時計算 150 題之最高決策票數</div>
    
    <div id="loadingStatus" class="loading">正在即時讀取並解析雲端投票數據，請稍候...</div>
    
    <table id="resultTable" style="display: none;">
        <thead>
            <tr>
                <th style="width: 8%;">題號</th>
                <th style="text-align: left; width: 42%;">題目內容</th>
                <th style="width: 12%;">贊成票</th>
                <th style="width: 12%;">反對票</th>
                <th style="width: 12%;">棄權票</th>
                <th style="width: 14%;">最終決議最高票</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script>

    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTGzF9pj3eAwk_RmgQYvsoRzehegqwM9Hhjk2B9cuPzgQBrIYX2y9DU67SLh29l7bRWu-JfzNT8NtTr/pub?output=csv';

    // CSV 解析簡易函式（處理包含雙引號的欄位）
    function parseCSV(text) {
        let lines = text.split(/\r\n|\n/);
        let result = [];
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i]) continue;
            // 尋找第一個逗號（時間戳記與內容的分隔點）
            let firstComma = lines[i].indexOf(',');
            if (firstComma === -1) continue;
            
            let jsonPart = lines[i].substring(firstComma + 1);
            // 去除 Google CSV 匯出時包裹在最外層的雙引號，並把重複的雙引號還原
            if (jsonPart.startsWith('"') && jsonPart.endsWith('"')) {
                jsonPart = jsonPart.substring(1, jsonPart.length - 1);
            }
            jsonPart = jsonPart.replace(/""/g, '"');
            result.push(jsonPart);
        }
        return result;
    }

    async function calculateVotes() {
        try {
            const response = await fetch(CSV_URL);
            const csvText = await response.text();
            const jsonRows = parseCSV(csvText);

            let stats = {};

            // 遍歷每個人投出來的整串 JSON 紀錄
            jsonRows.forEach(rowText => {
                try {
                    const rowData = JSON.parse(rowText);
                    for (let question in rowData) {
                        if (!stats[question]) {
                            stats[question] = { "贊成": 0, "反對": 0, "棄權": 0 };
                        }
                        const choice = rowData[question];
                        if (stats[question].hasOwnProperty(choice)) {
                            stats[question][choice]++;
                        }
                    }
                } catch (e) {
                    console.error("解析單列 JSON 失敗: ", rowText, e);
                }
            });

            // 渲染到前端 HTML 表格中
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            let index = 1;
            for (let question in stats) {
                const vApprove = stats[question]["贊成"];
                const vReject = stats[question]["反對"];
                const vNeutral = stats[question]["棄權"];
                
                // 判斷最高票
                let maxText = "尚無投票";
                let maxClass = "badge-none";
                
                if (vApprove > 0 || vReject > 0 || vNeutral > 0) {
                    if (vApprove >= vReject && vApprove >= vNeutral) {
                        maxText = "贊成"; maxClass = "badge-approve";
                    } else if (vReject >= vApprove && vReject >= vNeutral) {
                        maxText = "反對"; maxClass = "badge-reject";
                    } else {
                        maxText = "棄權"; maxClass = "badge-neutral";
                    }
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${index++}</td>
                    <td style="text-align: left; font-weight: 500;">${question}</td>
                    <td style="color: #2e7d32; font-weight: bold;">${vApprove}</td>
                    <td style="color: #c62828; font-weight: bold;">${vReject}</td>
                    <td style="color: #ef6c00; font-weight: bold;">${vNeutral}</td>
                    <td><span class="badge ${maxClass}">${maxText}</span></td>
                `;
                tbody.appendChild(tr);
            }

            document.getElementById('loadingStatus').style.display = 'none';
            document.getElementById('resultTable').style.display = 'table';

        } catch (error) {
            console.error(error);
            document.getElementById('loadingStatus').innerHTML = '<span style="color:red;">讀取統計失敗，請確認試算表已正確「發布到網路(CSV)」。</span>';
        }
    }

    calculateVotes();
</script>

</body>
</html>
